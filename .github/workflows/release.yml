name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect pre-release
        id: detect
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ b[0-9]+$ ]] || [[ "$TAG" =~ rc[0-9]+$ ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release archives
        run: |
          # Create zip with files at root (for HACS)
          cd custom_components/danfoss_ally_gateway
          zip -r ../../danfoss_ally_gateway.zip . -x "*.DS_Store" "*/.DS_Store"

          # Create alternative tar.gz
          tar -czf ../../danfoss_ally_gateway.tar.gz --exclude="*.DS_Store" .
          cd ../..

          echo "Created archives:"
          ls -la *.zip *.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.detect.outputs.prerelease }}
          files: |
            danfoss_ally_gateway.zip
            danfoss_ally_gateway.tar.gz
          generate_release_notes: true
